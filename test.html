<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Boyfriend Services 💖</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff0f5;
      text-align: center;
      padding-top: 80px;
    }

    h1 {
      color: #ff4d88;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 15px;
      display: inline-block;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    select {
      padding: 10px;
      border-radius: 8px;
      margin-top: 15px;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <h1>💖 Boyfriend Services 💖</h1>

  <div class="card">
    <p>Select a service 😌</p>

    <select id="menu" onchange="sendOrder()">
      <option disabled selected>Choose one...</option>
      <option>🧋 Milk Tea Delivery</option>
      <option>🍔 Food Delivery</option>
      <option>🎮 League Session</option>
      <option>🧩 Crossword Session</option>
      <option>🎁 Surprise</option>
      <option>📚 Assignment Help</option>
      <option>🚨 Emergency Visit</option>
    </select>
  </div>

  <script>
    function sendOrder() {
      const item = document.getElementById("menu").value;

      const phoneNumber = "491755930866";

      // Remove emojis before sending to WhatsApp
      const cleanItem = item.replace(/[^\x00-\x7F]/g, "").trim();

      const message = `Boyfriend Service Request:
Service: ${cleanItem}
Please respond ASAP`;

      const url = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;

      window.open(url, "_blank");
    }
  </script>

</body>
</html>
