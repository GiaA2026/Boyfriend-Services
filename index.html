<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Boyfriend Service</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
    }

    .card {
      max-width: 300px;
      margin: auto;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      background: #25D366;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    img {
      width: 100%;
      margin-top: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <div class="card">
    <p>Select a service 😌</p>

    <select id="menu">
      <option disabled selected>Choose one...</option>
      <option>🧋 Milk Tea Delivery</option>
      <option>🍔 Food Delivery</option>
      <option>🎮 League Session</option>
      <option>🧩 Crossword Session</option>
      <option>🎁 Surprise</option>
      <option>📚 Assignment Help</option>
      <option>🚨 Emergency Visit</option>
    </select>

    <button onclick="sendOrder()">Send Request</button>

    <img src="photo1.jpg" alt="Service preview">
  </div>

  <script>
    function sendOrder() {
      const item = document.getElementById("menu").value;

      if (!item || item === "Choose one...") {
        alert("Please select a service first 😊");
        return;
      }

      const phoneNumber = "491708470007";

      // Remove emojis for WhatsApp compatibility
      const cleanItem = item.replace(/[^\x00-\x7F]/g, "").trim();

      const message = `Official Boyfriend Service Request: ${cleanItem}`;

      const url = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;

      // iOS-safe redirect
      window.location.href = url;
    }
  </script>

</body>
</html>
